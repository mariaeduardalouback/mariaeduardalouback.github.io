<meta charset="utf-8">
<title>Laborátorio - Números</title>
<script src="trabalho.js" defer></script>
</head>

<body>
  <h1>Exercício - número 1</h1>
  <input type="text" data-js="numero1">
  <input type="text" data-js="numero2">
  <button type="button">Somar</button>
  <div data-js="result"></div>

  <script>
    document.querySelector('button')
      .addEventListener('click', handleClick, false);

    function handleClick() {
      var numero1 = document.querySelector('[data-js="numero1"]').value;
      var numero2 = document.querySelector('[data-js="numero2"]').value;

      document.querySelector('[data-js="result"]').innerHTML = sum(numero1, numero2);
    }

    function sum(numero1, numero2) {
      return numero1 + numero2;
    }
  </script>
<h1> Exercício - número 2 </h1>

   Primeira numero:<input id="numero1" type="number"> <br />
   Segundo  numero:<input id="numero2" type="number"> <br />
   
  <button onclick="maior()">Calcular Maior</button>

   <script type="text/javascript">

    function maior(){
     var num1 = parseFloat(document.getElementById("numero1").value);
     var num2 = parseFloat(document.getElementById("numero2").value);
    
    var maior = num1;

     if(num2 > maior)
      maior = num2;
     
     alert("Maior: "+maior);
    }
 </script>
</body>

</html>
